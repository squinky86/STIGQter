name: CodeQL

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 0 */16 * *"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [cpp]

    steps:
      - uses: actions/checkout@v4

      - name: Set timezone
        run: sudo ln -fs /usr/share/zoneinfo/America/Chicago /etc/localtime

      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libzip-dev g++ debhelper dpkg-dev zlib1g-dev \
            libminizip-dev libssl-dev cmake wget

      - name: Install Qt 6.8
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          cache: true

      - name: Build & install libxlsxwriter
        run: |
          cd /tmp
          wget -q https://github.com/jmcnamara/libxlsxwriter/archive/refs/tags/v1.2.4.tar.gz
          tar -zxf v1.2.4.tar.gz
          cd libxlsxwriter-1.2.4
          cat >> CMakeLists.txt <<'EOF'
          SET(CPACK_GENERATOR "DEB")
          set(CPACK_PACKAGE_NAME "libxlsxwriter")
          SET(CPACK_DEBIAN_PACKAGE_MAINTAINER "jwh0011@auburn.edu")
          set(CPACK_PACKAGE_VERSION "1.2.4")
          INCLUDE(CPack)
          EOF
          cmake -DCMAKE_BUILD_TYPE=Release .
          make -j"$(nproc)"
          cpack
          sudo dpkg -i libxlsxwriter-1.2.4-Linux.deb

      - name: Configure build (outside CodeQL tracer)
        run: qmake STIGQter.pro

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: manual
          queries: +security-and-quality

      - name: Build STIGQter
        run: make -j"$(nproc)"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
