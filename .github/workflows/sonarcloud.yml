name: SonarQube Cloud

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Code Coverage
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim

    env:
      DISPLAY: ":0"
      BUILD_WRAPPER_OUT_DIR: bw-output
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      LC_ALL: en

    steps:
      - name: Bootstrap container
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates git

      - uses: actions/checkout@v4
        with:
          # Disabling shallow clones is recommended for improving the relevancy of reporting
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          v=$(cat VERSION)
          echo "version=${v}" >> "$GITHUB_OUTPUT"

      - name: Set timezone
        run: ln -fs /usr/share/zoneinfo/America/Chicago /etc/localtime

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get install -y --no-install-recommends \
            qt6-base-dev qt6-base-dev-tools qmake6 libqt6sql6-sqlite \
            libzip-dev libxlsxwriter-dev build-essential \
            zlib1g-dev xvfb lcov gcovr unzip curl \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0 \
            libxcb-cursor0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$PWD"

      - name: Start Xvfb
        run: Xvfb "$DISPLAY" -screen 0 1280x1024x24 &

      - name: Install Sonar Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v6

      - name: Configure STIGQter for coverage
        run: |
          qmake6 STIGQter.pro
          sed -i \
            -e 's:-O2:-O0 -fprofile-arcs -ftest-coverage -fno-exceptions -fno-inline:g' \
            -e 's:-Wl,-O1:-Wl,-O1 -lgcov --coverage:g' \
            Makefile

      - name: Build STIGQter under Build Wrapper
        run: build-wrapper-linux-x86-64 --out-dir "${BUILD_WRAPPER_OUT_DIR}" make -j"$(nproc)"

      - name: Build test binary
        run: |
          cd tests
          qmake6 tests.pro
          # Match the coverage flags used for the main build so test-driven
          # exercise of src/*.cpp produces .gcda alongside the existing .gcno.
          sed -i \
            -e 's:-O2:-O0 -fprofile-arcs -ftest-coverage -fno-exceptions -fno-inline:g' \
            -e 's:-Wl,-O1:-Wl,-O1 -lgcov --coverage:g' \
            Makefile
          make -j"$(nproc)"

      - name: Run tests
        run: ./tests/tst_stigqter

      - name: Generate gcov reports
        run: for x in src/*.cpp; do gcov --branch-probabilities --branch-counts "${x}" -o .; done

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=squinky86
            -Dsonar.projectKey=squinky86_STIGQter
            -Dsonar.projectName=STIGQter
            -Dsonar.projectVersion=${{ steps.version.outputs.version }}
            -Dsonar.sources=./src/
            -Dsonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json
            -Dsonar.cfamily.threads=2
            -Dsonar.cfamily.gcov.reportsPath=.

      - name: Build LCOV report
        run: |
          mkdir -p coverage
          lcov --capture --directory . --output-file coverage/lcov.info

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: coverage/lcov.info
