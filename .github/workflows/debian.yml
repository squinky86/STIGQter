name: Debian CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim

    steps:
      - name: Bootstrap container
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates git

      - uses: actions/checkout@v4

      - name: Set timezone
        run: ln -fs /usr/share/zoneinfo/America/Chicago /etc/localtime

      - name: Extract version & arch
        id: version
        run: |
          v=$(cat VERSION)
          a=$(dpkg --print-architecture)
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "arch=${a}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get install -y --no-install-recommends \
            qt6-base-dev qt6-base-dev-tools qmake6 libqt6sql6-sqlite \
            libzip-dev libxlsxwriter-dev build-essential \
            debhelper dpkg-dev zlib1g-dev fakeroot

      - name: Build source tarball
        run: |
          v="${{ steps.version.outputs.version }}"
          git config --global --add safe.directory "$PWD"
          git archive --format=tar.gz -o "../stigqter_${v}.orig.tar.gz" master

      - name: dpkg-buildpackage
        run: dpkg-buildpackage --no-sign

      - name: Stage Debian package
        run: |
          v="${{ steps.version.outputs.version }}"
          a="${{ steps.version.outputs.arch }}"
          mv "../stigqter_${v}-1_${a}.deb" /tmp/

      - uses: actions/upload-artifact@v4
        with:
          name: STIGQter-debian-package
          path: /tmp/stigqter_${{ steps.version.outputs.version }}-1_${{ steps.version.outputs.arch }}.deb
