name: Debian CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set timezone
        run: sudo ln -fs /usr/share/zoneinfo/America/Chicago /etc/localtime

      - name: Extract version & arch
        id: version
        run: |
          v=$(cat VERSION)
          a=$(dpkg --print-architecture)
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "arch=${a}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libzip-dev libxlsxwriter-dev build-essential \
            debhelper dpkg-dev zlib1g-dev \
            libqt6gui6 libqt6widgets6 libqt6network6 \
            libqt6sql6-sqlite libqt6xml6

      - name: Install Qt 6.8
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          cache: true

      - name: Expose Qt as qmake6 for debhelper
        run: sudo ln -sf "${QT_ROOT_DIR}/bin/qmake" /usr/local/bin/qmake6

      - name: Build source tarball
        run: |
          v="${{ steps.version.outputs.version }}"
          git archive --format=tar.gz -o "../stigqter_${v}.orig.tar.gz" master

      - name: dpkg-buildpackage
        # -d: bypass dpkg-checkbuilddeps for qt6-base-dev/qmake6 — Qt comes
        # from install-qt-action (newer than the apt packages), not apt.
        run: dpkg-buildpackage --no-sign -d

      - name: Stage Debian package
        run: |
          v="${{ steps.version.outputs.version }}"
          a="${{ steps.version.outputs.arch }}"
          mv "../stigqter_${v}-1_${a}.deb" /tmp/

      - uses: actions/upload-artifact@v4
        with:
          name: STIGQter-debian-package
          path: /tmp/stigqter_${{ steps.version.outputs.version }}-1_${{ steps.version.outputs.arch }}.deb
